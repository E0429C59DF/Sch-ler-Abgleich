{% extends "base.html" %}

{% block title %}Anmeldung{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 400px; margin: 5rem auto;">
        <h1> Anmeldung </h1>

        {% if error %}
        <div style="color: red; padding: 1rem; background-color: #ffe0e0; margin-bottom: 1rem">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div style="margin-bottom: 1rem;">
                <label for="username">Benutzername:</label>
                <input type="text" id="username" name="username" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" style="width: 100%; padding: 0.5rem; margin-top: 0.25rem;">
            </div>

            <button type="submit" class="btn" style="width: 100%;">Anmelden</button>
        </form>
    </div>
</div>
{% endblock %}
